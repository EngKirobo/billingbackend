# ===============================
# APPLICATION
# ===============================
spring.application.name=auth

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# DATABASE (MySQL)
# ===============================
# spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===================================================================
# PRIMARY DATABASE - AUTH (Most Important)
# ===================================================================
spring.datasource.primary.jdbc-url=jdbc:mysql://localhost:3306/auth_db
spring.datasource.primary.username=root
spring.datasource.primary.password=root
spring.datasource.primary.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# DATABASE 2 - SHORTCOURSE
# ===================================================================
spring.datasource.shortcourse.jdbc-url=jdbc:mysql://localhost:3306/shortcourse_db
spring.datasource.shortcourse.username=root
spring.datasource.shortcourse.password=root
spring.datasource.shortcourse.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# DATABASE 3 - DRIVING
# ===================================================================
spring.datasource.driving.jdbc-url=jdbc:mysql://localhost:3306/driving_db
spring.datasource.driving.username=root
spring.datasource.driving.password=root
spring.datasource.driving.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# DATABASE 4 - HOSTEL
# ===================================================================
spring.datasource.hostel.jdbc-url=jdbc:mysql://localhost:3306/myhostel
spring.datasource.hostel.username=root
spring.datasource.hostel.password=root
spring.datasource.hostel.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# DATABASE 5 - WORKSHOP
# ===================================================================
spring.datasource.workshop.jdbc-url=jdbc:mysql://localhost:3306/workshop_db
spring.datasource.workshop.username=root
spring.datasource.workshop.password=root
spring.datasource.workshop.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / HIBERNATE SHARED SETTINGS
# ===================================================================
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# SECURITY (DEBUGGING)
# ===============================
logging.level.org.springframework.security=DEBUG

# ===============================
# JWT (CUSTOM SETTINGS)
# ===============================
jwt.secret=A34kfhwjfkjfkjhsrrtpiopsASJSKw34j3lknfnmfnbwDSO1234567890
jwt.expiration=86400000

# ===============================
# DEVTOOLS
# ===============================
spring.devtools.restart.enabled=true

# ===============================
# JSON RESPONSE FORMAT
# ===============================
spring.jackson.serialization.indent_output=true

# ===============================
# TEST FIX (IMPORTANT)
# ===============================
spring.main.allow-bean-definition-overriding=true